width:0}.panel-kind{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-mute)}.panel-title{font-weight:600;font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.btn-close{background:transparent;border:none;color:var(--fg-mute);font-size:18px;cursor:pointer;line-height:1}.btn-close:hover{color:var(--fg)}.panel-body{flex:1;padding:8px 12px 12px;overflow:auto;font-size:12px;color:var(--fg)}.panel-empty{color:var(--fg-mute);font-size:12px;text-align:center;padding:20px 8px;line-height:1.5}.tmpl{display:flex;flex-direction:column;gap:8px}.kv{display:grid;grid-template-columns:100px 1fr;gap:8px;font-size:12px;align-items:baseline}.kv.kv-multi{grid-template-columns:100px 1fr;align-items:start}.kv-key{color:var(--fg-mute);font-size:11px;letter-spacing:.02em;text-transform:uppercase}.kv-val{color:var(--fg);word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.45;white-space:pre-wrap}details.raw-json{margin-top:12px;padding-top:8px;border-top:1px solid var(--grid);color:var(--fg-mute)}details.raw-json>summary{cursor:pointer;font-size:11px;letter-spacing:.06em;text-transform:uppercase;user-select:none}details.raw-json>summary:hover{color:var(--fg)}details.raw-json>pre{margin:8px 0 0;padding:8px;background:#ffffff05;border:1px solid var(--grid);border-radius:3px;font-size:11px;line-height:1.4;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--fg);white-space:pre-wrap;word-break:break-word;overflow-x:auto}</style>
  </head>
  <body>
    <div id="replay-app">
      <header id="replay-topbar">
        <div class="brand">gaia · starmap · replay</div>
        <div id="pkg-name"></div>
        <div id="stage-badge"></div>
        <div id="round-badge"></div>
      </header>

      <nav id="chapter-strip" class="chapter-strip"></nav>

      <section id="lanes">
        <!-- Static markers carry IDs that v1's smoke tests grep for; the
             v2 timeline module renders into the same #lanes host above. -->
        <span id="lane-retrieval-track" hidden></span>
        <span id="lane-growth-track" hidden></span>
      </section>

      <section id="canvas-region">
        <svg id="graph-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="canvas-hint">scroll to zoom · drag canvas to pan · hover for prior &amp; belief · double-click to reset</div>
      </section>

      <footer id="controls">
        <button id="btn-step-prev" class="btn btn-step" title="previous event (←)">‹</button>
        <button id="btn-play" class="btn">play</button>
        <button id="btn-step-next" class="btn btn-step" title="next event (→)">›</button>
        <button id="btn-restart" class="btn">restart</button>
        <input id="scrub" type="range" min="0" max="0" step="1" value="0" />
        <span id="position">0 / 0</span>
        <label class="speed">
          speed
          <select id="speed">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
        </label>
      </footer>

      <aside id="event-panel" class="hidden"></aside>
    </div>
  </body>
</html>
