name: Release (stable)

# Manual stable promotion per spec §8 step 5. workflow_dispatch only; no
# auto-trigger. 协作单 五·Q7 + 七 locks: release artifacts are durable
# (never retracted from PyPI), so every non-dry-run stable publish creates a
# git tag (`v<version>`) and a GitHub release after PyPI publish succeeds.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PEP 440 version (stable example: 0.5.0)"
        required: true
        type: string
      target_commit:
        description: "Full commit SHA recorded in the Release Issue"
        required: true
        type: string
      dry_run:
        description: "Build and validate but skip publish"
        required: false
        type: boolean
        default: false

permissions:
  # `contents: write` is needed for the stable-only git tag push + gh release create.
  # `id-token: write` is required for PyPI Trusted Publishing.
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Configure git identity (for tag commits)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify target commit
        env:
          HEAD_SHA: ${{ github.sha }}
          TARGET_COMMIT: ${{ inputs.target_commit }}
        run: |
          test "$HEAD_SHA" = "$TARGET_COMMIT" || {
            echo "::error::workflow head SHA $HEAD_SHA does not match target_commit $TARGET_COMMIT"
            exit 1
          }

      - name: Release
        uses: ./.github/actions/release
        with:
          version: ${{ inputs.version }}
          channel: "stable"
          commit: ${{ github.sha }}
          dry_run: ${{ inputs.dry_run }}

      - name: Publish to PyPI (OIDC trusted publishing)
        if: ${{ inputs.dry_run == false }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create git tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git tag -a "v${{ inputs.version }}" -m "gaia-lang v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            dist/*.whl dist/*.tar.gz
