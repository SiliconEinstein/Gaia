name: Release (stable)

# Manual stable promotion per spec §8 step 5. workflow_dispatch only; no
# auto-trigger. 协作单 五·Q7 + 七 locks: pre-release artifacts are durable
# (never retracted from PyPI). Stable is the only channel that creates a
# git tag (`v<version>`) and a GitHub release; both steps are gated on
# `dry_run != 'true'` inside the composite action.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PEP 440 version (stable example: 0.5.1)"
        required: true
        type: string
      dry_run:
        description: "Build and validate but skip publish"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Configure git identity (for tag commits)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        uses: ./.github/actions/release
        with:
          version: ${{ inputs.version }}
          channel: "stable"
          commit: ${{ github.sha }}
          dry_run: ${{ inputs.dry_run }}
          pypi_token: ${{ secrets.PYPI_API_TOKEN }}
          do_git_tag: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
