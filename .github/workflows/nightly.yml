name: Nightly

on:
  schedule:
    # 06:00 UTC daily = 14:00 Asia/Shanghai. Spec §8 step 2 ("scheduled
    # nightly") + dispatch lock §七·Invariant ("workflow_dispatch 可手动触发,
    # 不依赖 schedule").
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest

    strategy:
      # Single-entry matrix per R1 dispatch lock (Python 3.12 only).
      # Kept as a matrix so future channel expansion (e.g. 3.13) is a
      # one-line edit rather than a workflow restructure.
      matrix:
        python-version: ["3.12"]

    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: none
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.11.3"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Suppression budget
        run: uv run python scripts/check_suppression_budget.py

      # `make test-all` runs `pytest` with no marker filter, covering both
      # the fast and slow slices in a single invocation. This is spec-faithful
      # (§4 Nightly CI lists test-all + test-slow, but test-slow is a strict
      # subset of test-all per Makefile semantics, so running both would
      # double-run the slow suite). pytest addopts in pyproject.toml already
      # gather coverage; nightly does not upload to Codecov (PR CI owns the
      # patch-coverage signal).
      - name: Run all tests
        run: make test-all

      - name: Build documentation
        run: uv run --extra docs mkdocs build --strict

      # Builds the wheel under dist/, installs into a fresh venv, and smokes
      # `gaia --help` + the seven L2 engine facade imports. Stage 2 composite
      # action; do not duplicate `uv build` here.
      - name: Wheel smoke
        uses: ./.github/actions/wheel-smoke

      # Stage 3 corpus runner. Step id is referenced by the artifact-upload
      # condition below: a red corpus must block artifact upload per R1
      # dispatch lock ("package-corpus failures block nightly artifact
      # upload"). NOTE: the first nightly run is expected to fail here on
      # `gaia build check --gate` for galileo (8 unreviewed claims); fixture
      # review is a separate follow-up (Stage 7 territory).
      - name: Package corpus e2e
        id: corpus
        run: uv run python scripts/run_package_corpus.py

      # Build sdist alongside the wheel that wheel-smoke already produced.
      # `uv build` is idempotent; this guarantees dist/ contains both
      # artifacts before upload regardless of wheel-smoke internals.
      - name: Build sdist
        if: steps.corpus.outcome == 'success'
        run: uv build --sdist

      # Artifact target is GHA artifact only per R2 dispatch lock (PyPI /
      # GitHub pre-release publishing belongs in Stage 6 release workflows).
      # Conditioned on corpus success so a compatibility-red build never
      # produces a downloadable artifact.
      - name: Upload nightly artifact
        if: steps.corpus.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gaia-nightly-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
