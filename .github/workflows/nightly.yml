name: Nightly

on:
  schedule:
    # 20:00 UTC = 04:00 Asia/Shanghai (next day). Daily nightly cadence.
    # Workflow body runs full validation gates including corpus runner;
    # with current galileo --gate red, scheduled runs will fail until
    # the galileo fixture is reviewed — accepted noise as a daily
    # reminder that the fixture review is pending.
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest

    strategy:
      # Single-entry matrix per R1 dispatch lock (Python 3.12 only).
      # Kept as a matrix so future channel expansion (e.g. 3.13) is a
      # one-line edit rather than a workflow restructure.
      matrix:
        python-version: ["3.12"]

    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: none
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.11.3"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install dependencies
        run: uv sync --extra dev

      # Spec §3 mandates Nightly version form `0.5.1.dev<YYYYMMDD>` (PEP 440
      # dev tag). Without this bump the daily wheel filename collides at
      # `gaia_lang-0.5.0-*.whl` and nightlies are indistinguishable. The sed
      # is pinned to the literal current dev version ('0.5.0'); the grep
      # assertion fails loudly if pyproject drifts past 0.5.0 (so this
      # transient bump never silently no-ops). NEVER commit pyproject — the
      # runner discards its checkout on completion.
      - name: Bump version to nightly dev form
        run: |
          dev_date=$(date -u +%Y%m%d)
          sed -i 's/^version = "0\.5\.0"$/version = "0.5.1.dev'${dev_date}'"/' pyproject.toml
          grep -q "^version = \"0\.5\.1\.dev${dev_date}\"$" pyproject.toml || {
            echo "::error::Failed to bump pyproject.toml version (current: $(grep ^version pyproject.toml))"
            exit 1
          }
          grep ^version pyproject.toml

      # Spec §6 mandates `gaia --version` from nightly artifacts must report
      # channel=nightly and commit=<sha>. gaia/_meta.py reads these via
      # `from gaia._build_info import CHANNEL, COMMIT` with 'dev'/'unknown'
      # fallback when the file is absent (dev checkouts). Mirrors the
      # release composite action's build_info pattern.
      - name: Inject build_info (channel + commit)
        run: |
          cat > gaia/_build_info.py <<EOF
          # Auto-generated by nightly workflow — DO NOT COMMIT
          CHANNEL = "nightly"
          COMMIT = "${{ github.sha }}"
          EOF

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Suppression budget
        run: uv run python scripts/check_suppression_budget.py

      # `make test-all` runs `pytest` with no marker filter, covering both
      # the fast and slow slices in a single invocation. This is spec-faithful
      # (§4 Nightly CI lists test-all + test-slow, but test-slow is a strict
      # subset of test-all per Makefile semantics, so running both would
      # double-run the slow suite). pytest addopts in pyproject.toml already
      # gather coverage; nightly does not upload to Codecov (PR CI owns the
      # patch-coverage signal).
      - name: Run all tests
        run: make test-all

      - name: Build documentation
        run: uv run --extra docs mkdocs build --strict

      # Builds the wheel under dist/, installs into a fresh venv, and smokes
      # `gaia --help` + the seven L2 engine facade imports. Stage 2 composite
      # action; do not duplicate `uv build` here.
      - name: Wheel smoke
        uses: ./.github/actions/wheel-smoke

      # Stage 3 corpus runner. Step id is referenced by the artifact-upload
      # condition below: a red corpus must block artifact upload per R1
      # dispatch lock ("package-corpus failures block nightly artifact
      # upload"). NOTE: the first nightly run is expected to fail here on
      # `gaia build check --gate` for galileo (8 unreviewed claims); fixture
      # review is a separate follow-up (Stage 7 territory).
      - name: Package corpus e2e
        id: corpus
        run: uv run python scripts/run_package_corpus.py

      # Build sdist alongside the wheel that wheel-smoke already produced.
      # `uv build` is idempotent; this guarantees dist/ contains both
      # artifacts before upload regardless of wheel-smoke internals.
      - name: Build sdist
        if: steps.corpus.outcome == 'success'
        run: uv build --sdist

      # Artifact target is GHA artifact only per R2 dispatch lock (PyPI /
      # GitHub pre-release publishing belongs in Stage 6 release workflows).
      # Conditioned on corpus success so a compatibility-red build never
      # produces a downloadable artifact.
      - name: Upload nightly artifact
        if: steps.corpus.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gaia-nightly-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
