name: CI

on:
  push:
    branches: [main, v0.5]
  pull_request:
    branches: [main, v0.5]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: none
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.11.3"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Suppression budget
        run: uv run python scripts/check_suppression_budget.py

      - name: Run tests
        run: uv run pytest -n auto tests -v -m "not slow" --cov=gaia --cov-fail-under=90

      - name: Wheel smoke
        uses: ./.github/actions/wheel-smoke

  commit-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Validate PR commits follow Conventional Commits
        run: |
          uv run cz check --rev-range origin/${{ github.base_ref }}..HEAD
