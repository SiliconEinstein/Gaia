name: Release (alpha)

# Manual alpha promotion per spec §8 step 5. workflow_dispatch only; no
# auto-trigger (no schedule, no tag-push, no PR). 协作单 五·Q7 + 七 locks:
# pre-release artifacts are durable (never retracted from PyPI); alpha does
# not tag or create a GitHub release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PEP 440 version (alpha example: 0.5.1a1)"
        required: true
        type: string
      dry_run:
        description: "Build and validate but skip publish"
        required: false
        type: boolean
        default: false

permissions:
  # `contents: write` is needed only by stable for tag push + gh release create;
  # harmless on alpha/beta/rc since those code paths are guarded by do_git_tag.
  # `id-token: write` is required for OIDC trusted publishing to PyPI via
  # pypa/gh-action-pypi-publish inside the composite action.
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Configure git identity (for tag commits)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        uses: ./.github/actions/release
        with:
          version: ${{ inputs.version }}
          channel: "a"
          commit: ${{ github.sha }}
          dry_run: ${{ inputs.dry_run }}
          do_git_tag: "false"
          github_token: ${{ secrets.GITHUB_TOKEN }}
