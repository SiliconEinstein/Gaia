name: Release (alpha)

# Manual alpha promotion per spec §8 step 5. workflow_dispatch only; no
# auto-trigger (no schedule, no tag-push, no PR). 协作单 五·Q7 + 七 locks:
# pre-release artifacts are durable (never retracted from PyPI), so every
# non-dry-run alpha publish also creates a matching `v<version>` tag and
# GitHub prerelease.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PEP 440 version (alpha example: 0.5.0a1)"
        required: true
        type: string
      dry_run:
        description: "Build and validate but skip publish"
        required: false
        type: boolean
        default: false

permissions:
  # `contents: write` is harmless on alpha and keeps the release workflows
  # uniform. `id-token: write` is required for PyPI Trusted Publishing.
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.3"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Configure git identity (for tag commits)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        uses: ./.github/actions/release
        with:
          version: ${{ inputs.version }}
          channel: "a"
          commit: ${{ github.sha }}
          dry_run: ${{ inputs.dry_run }}

      - name: Publish to PyPI (OIDC trusted publishing)
        if: ${{ inputs.dry_run == false }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create git tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git tag -a "v${{ inputs.version }}" -m "gaia-lang v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub prerelease
        if: ${{ inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "Gaia Lang v${{ inputs.version }}" \
            --prerelease \
            --generate-notes \
            dist/*.whl dist/*.tar.gz
