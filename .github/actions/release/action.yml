name: Release validation
description: >-
  Build and validate a gaia-lang wheel/sdist for a given channel. Publishing
  stays in the top-level caller workflow because PyPA Trusted Publishing does
  not support being invoked from a composite action.

inputs:
  version:
    description: "PEP 440 version string (e.g. 0.5.0a1, 0.5.0, 0.5.0rc1)"
    required: true
  channel:
    description: "Release channel: a, b, rc, stable"
    required: true
  commit:
    description: "Source commit SHA for build_info"
    required: true
  dry_run:
    description: "true|false — skip publish, only build+validate"
    required: true

runs:
  using: composite
  steps:
    # Transient pyproject.toml version override. NEVER commit this change —
    # the workflow runner discards its checkout on completion.
    #
    # The pattern reads the current version from pyproject.toml dynamically so
    # the same action works on both `main` and `release/0.N.x` branches without
    # manual updates when the minor series advances.
    - name: Set version in pyproject.toml (transient, not committed)
      shell: bash
      run: |
        CURRENT=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
        echo "Current pyproject.toml version: ${CURRENT}"
        sed -i "s/^version = \"${CURRENT}\"$/version = \"${{ inputs.version }}\"/" pyproject.toml
        # Strict assert: sed actually replaced; fails loudly on a silent no-op.
        grep -q "^version = \"${{ inputs.version }}\"$" pyproject.toml || {
          echo "::error::pyproject.toml version mismatch after sed (expected '${{ inputs.version }}'; current: $(grep ^version pyproject.toml))"
          exit 1
        }
        grep ^version pyproject.toml

    # Inject build-time channel + commit. gaia/_meta.py reads these via
    # `from gaia._build_info import CHANNEL, COMMIT` with a 'dev'/'unknown'
    # fallback when the file is absent (dev checkouts).
    - name: Inject build_info (channel + commit)
      shell: bash
      run: |
        cat > gaia/_build_info.py <<EOF
        # Auto-generated by release workflow — DO NOT COMMIT
        CHANNEL = "${{ inputs.channel }}"
        COMMIT = "${{ inputs.commit }}"
        EOF

    - name: uv sync
      shell: bash
      run: uv sync --extra dev

    # Sanity gate: the injected channel + version must show up in `gaia --version`.
    # Catches a busted _build_info.py or a sed/version-injection bug before we
    # ship a wheel labeled wrong.
    - name: Verify gaia --version reflects the release metadata
      shell: bash
      run: |
        version_output=$(uv run gaia --version)
        echo "$version_output"
        echo "$version_output" | grep -q "^channel: ${{ inputs.channel }}$" || {
          echo "::error::gaia --version did not report channel=${{ inputs.channel }}"
          exit 1
        }
        echo "$version_output" | grep -q "^gaia-lang ${{ inputs.version }}$" || {
          echo "::error::gaia --version did not report version=${{ inputs.version }}"
          exit 1
        }

    - name: Build wheel + sdist
      shell: bash
      run: uv build

    # Reuse the Stage 2 composite: fresh-venv install + `gaia --help` smoke +
    # seven L2 engine facade imports. It runs its own `uv build` (idempotent)
    # so the version + build_info we just set are baked into the smoked wheel.
    - name: Validate via wheel-smoke (fresh-venv install + import facades)
      uses: ./.github/actions/wheel-smoke

    # B1 release-time validation gates. These mirror nightly CI's full-suite
    # gates and operate on the source tree (not the built wheel), so they test
    # the implementation that produced the wheel — correct gating posture per
    # spec §4 (release CI = nightly CI + publishing checks). Gates run in both
    # dry-run and non-dry-run modes: dry-run skips publish/tag/release but the
    # gates ARE the pipeline being verified, so they always run.
    - name: Install graphviz (for mkdocs / corpus rendering)
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y graphviz

    - name: Run full test suite (release gate)
      shell: bash
      run: make test-all

    - name: Build docs strict (release gate)
      shell: bash
      run: uv run --extra docs mkdocs build --strict

    - name: Run package corpus e2e (release gate)
      shell: bash
      run: uv run python scripts/run_package_corpus.py

    - name: Dry-run summary
      if: inputs.dry_run == 'true'
      shell: bash
      run: |
        echo "::notice::dry-run: built artifacts (not published):"
        ls -la dist/
        echo "::notice::Caller workflow would publish these artifacts to PyPI"
