name: Release
description: >-
  Build, validate, and (if not dry-run) publish a gaia-lang wheel/sdist for a
  given channel. Stage 6 of spec §8 step 5: factor shared release logic out of
  the four manual caller workflows (alpha/beta/rc/stable).

inputs:
  version:
    description: "PEP 440 version string (e.g. 0.5.1a1, 0.5.1, 0.5.1rc1)"
    required: true
  channel:
    description: "Release channel: a, b, rc, stable"
    required: true
  commit:
    description: "Source commit SHA for build_info"
    required: true
  dry_run:
    description: "true|false — skip publish, only build+validate"
    required: true
  do_git_tag:
    description: "true|false — only true for stable channel"
    required: true
  github_token:
    description: "GITHUB_TOKEN for gh release create; required if do_git_tag=true and dry_run=false"
    required: false

runs:
  using: composite
  steps:
    # Transient pyproject.toml version override. NEVER commit this change —
    # the workflow runner discards its checkout on completion. The sed pin to
    # the literal current dev version ('0.5.0') guarantees we error loudly if
    # the source-of-truth version drifts and the brief is no longer accurate.
    - name: Set version in pyproject.toml (transient, not committed)
      shell: bash
      run: |
        sed -i 's/^version = "0\.5\.0"$/version = "${{ inputs.version }}"/' pyproject.toml
        grep '^version' pyproject.toml

    # Inject build-time channel + commit. gaia/_meta.py reads these via
    # `from gaia._build_info import CHANNEL, COMMIT` with a 'dev'/'unknown'
    # fallback when the file is absent (dev checkouts).
    - name: Inject build_info (channel + commit)
      shell: bash
      run: |
        cat > gaia/_build_info.py <<EOF
        # Auto-generated by release workflow — DO NOT COMMIT
        CHANNEL = "${{ inputs.channel }}"
        COMMIT = "${{ inputs.commit }}"
        EOF

    - name: uv sync
      shell: bash
      run: uv sync --extra dev

    # Sanity gate: the injected channel must show up in `gaia --version`.
    # Catches a busted _build_info.py before we ship a wheel labeled wrong.
    - name: Verify gaia --version reflects the release metadata
      shell: bash
      run: |
        uv run gaia --version
        uv run gaia --version | grep -q "^channel: ${{ inputs.channel }}$" || {
          echo "::error::gaia --version did not report channel=${{ inputs.channel }}"
          exit 1
        }

    - name: Build wheel + sdist
      shell: bash
      run: uv build

    # Reuse the Stage 2 composite: fresh-venv install + `gaia --help` smoke +
    # seven L2 engine facade imports. It runs its own `uv build` (idempotent)
    # so the version + build_info we just set are baked into the smoked wheel.
    - name: Validate via wheel-smoke (fresh-venv install + import facades)
      uses: ./.github/actions/wheel-smoke

    - name: Publish to PyPI (OIDC trusted publishing)
      if: inputs.dry_run != 'true'
      uses: pypa/gh-action-pypi-publish@release/v1

    # Stable-only: tag and GitHub release. Both gated on dry_run too so a
    # dry-run stable dispatch never touches refs or releases.
    - name: Create git tag (stable only)
      if: inputs.dry_run != 'true' && inputs.do_git_tag == 'true'
      shell: bash
      run: |
        git tag -a "v${{ inputs.version }}" -m "gaia-lang v${{ inputs.version }}"
        git push origin "v${{ inputs.version }}"

    - name: Create GitHub release (stable only)
      if: inputs.dry_run != 'true' && inputs.do_git_tag == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        gh release create "v${{ inputs.version }}" \
          --title "v${{ inputs.version }}" \
          --generate-notes \
          dist/*.whl dist/*.tar.gz

    - name: Dry-run summary
      if: inputs.dry_run == 'true'
      shell: bash
      run: |
        echo "::notice::dry-run: built artifacts (not published):"
        ls -la dist/
        echo "::notice::Would have published to PyPI"
        if [ "${{ inputs.do_git_tag }}" = "true" ]; then
          echo "::notice::Would have tagged v${{ inputs.version }} and created GitHub release"
        fi
