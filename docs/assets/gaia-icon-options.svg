<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="600"
  viewBox="0 0 1200 600"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Gaia icon options</title>
  <desc id="desc">Ten candidate Gaia icons arranged in a two-row contact sheet.</desc>
  <defs>
    <linearGradient id="bg-navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1f33" />
      <stop offset="0.6" stop-color="#123a45" />
      <stop offset="1" stop-color="#173f2f" />
    </linearGradient>
    <linearGradient id="ring-mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8c9" />
      <stop offset="0.58" stop-color="#a7f3d0" />
      <stop offset="1" stop-color="#f4c95d" />
    </linearGradient>
    <linearGradient id="bg-ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827" />
      <stop offset="1" stop-color="#15313a" />
    </linearGradient>
    <linearGradient id="bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eefdf8" />
      <stop offset="1" stop-color="#d9f1ff" />
    </linearGradient>
    <style>
      .sheet { fill: #f6faf8; }
      .tile { fill: #ffffff; stroke: #d8e6e1; stroke-width: 1.5; }
      .label { fill: #28423d; font: 600 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .caption { fill: #5c706c; font: 500 12px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .dark-stroke { stroke: #0b1f33; }
      .mint { fill: #67e8c9; }
      .pale { fill: #a7f3d0; }
      .gold { fill: #f4c95d; }
      .ink { fill: #113847; }
      .paper { fill: #f5fffb; }
    </style>
  </defs>

  <rect class="sheet" width="1200" height="600" />
  <text x="40" y="44" class="label" style="font-size:24px">Gaia icon candidates</text>
  <text x="40" y="68" class="caption">Pick a number; the selected candidate can become docs/assets/gaia-icon.svg.</text>

