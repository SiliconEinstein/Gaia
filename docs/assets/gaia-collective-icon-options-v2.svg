      .cap { fill: #60736f; font: 500 12px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mint { fill: #5ee7c4; }
      .pale { fill: #a7f3d0; }
      .gold { fill: #f4c95d; }
      .paper { fill: #f8fffb; }
      .ink { fill: #102f3b; }
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dark { stroke: #102f3b; }
      .mintline { stroke: #5ee7c4; }
      .goldline { stroke: #f4c95d; }
