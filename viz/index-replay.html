<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaia Starmap — Replay</title>
    <!--__TIMELINE_DATA__-->
  </head>
  <body>
    <div id="replay-app">
      <header id="replay-topbar">
        <div class="brand">gaia · starmap · replay</div>
        <div id="pkg-name"></div>
        <div id="stage-badge"></div>
        <div id="round-badge"></div>
      </header>

      <nav id="chapter-strip" class="chapter-strip"></nav>

      <section id="lanes">
        <!-- Static markers carry IDs that v1's smoke tests grep for; the
             v2 timeline module renders into the same #lanes host above. -->
        <span id="lane-retrieval-track" hidden></span>
        <span id="lane-growth-track" hidden></span>
      </section>

      <section id="canvas-region">
        <svg id="graph-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="canvas-hint">scroll to zoom · drag canvas to pan · hover for prior &amp; belief · double-click to reset</div>
      </section>

      <footer id="controls">
        <button id="btn-step-prev" class="btn btn-step" title="previous event (←)">‹</button>
        <button id="btn-play" class="btn">play</button>
        <button id="btn-step-next" class="btn btn-step" title="next event (→)">›</button>
        <button id="btn-restart" class="btn">restart</button>
        <input id="scrub" type="range" min="0" max="0" step="1" value="0" />
        <span id="position">0 / 0</span>
        <label class="speed">
          speed
          <select id="speed">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
        </label>
      </footer>

      <aside id="event-panel" class="hidden"></aside>
    </div>
    <script type="module" src="/src/starmap-replay.ts"></script>
  </body>
</html>
