# 推导模块 — 从牛顿定律推导出 a = g
# 核心链：F=ma + F=mg → ma=mg → a=g（与质量无关）

type: reasoning_module
name: derivation
title: "推导 — 从牛顿定律推导出 a = g"

premises:
  - type: ref
    name: second_law
    target: laws.second_law

  - type: ref
    name: law_of_gravity
    target: laws.law_of_gravity

  - type: ref
    name: mass_equivalence
    target: laws.mass_equivalence

  - type: ref
    name: near_earth_surface
    target: laws.near_earth_surface

chains:
  - name: force_equating_chain
    conclusion:
      type: claim
      name: force_equation_result
      content: >
        对地表附近的自由落体：m × a = m × g，约去质量得 a = g。
        自由落体加速度等于引力场强度，与物体的质量无关。
      reasoning: >
        由牛顿第二定律得 F = m_i × a；由万有引力定律得 F = m_g × g。
        因为作用在同一物体上的合力相等，所以 m_i × a = m_g × g。
        又由惯性质量与引力质量等价可知 m_i = m_g，两边约去质量，得 a = g。
      refs:
        - ref: second_law
          dependency: direct
        - ref: law_of_gravity
          dependency: direct
        - ref: mass_equivalence
          dependency: direct
        - ref: near_earth_surface
          dependency: indirect
      prior: 0.5
      conditional_prior: 0.97

  - name: mass_independence_chain
    conclusion:
      type: claim
      name: acceleration_independent_of_mass
      content: >
        在同一引力场中，所有物体的自由落体加速度相同，与质量无关。
        这是牛顿力学的理论推论，不依赖于任何具体实验。
      reasoning: >
        一旦得到 a = g，结论就不再含有物体质量。
        这意味着在同一引力场中，无论物体质量多大，其自由落体加速度都相同。
      refs:
        - ref: force_equation_result
          dependency: direct
      prior: 0.5
      conditional_prior: 0.95

export:
  - force_equation_result
  - acceleration_independent_of_mass
