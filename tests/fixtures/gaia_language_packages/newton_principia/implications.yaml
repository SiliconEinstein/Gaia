# 含义模块 — 牛顿推导与伽利略和亚里士多德的关系
# 演示跨 package 引用和 relation 类型

type: reasoning_module
name: implications
title: "含义 — 牛顿推导与伽利略和亚里士多德的关系"

premises:
  - type: ref
    name: acceleration_independent_of_mass
    target: derivation.acceleration_independent_of_mass

  - type: ref
    name: galileo_vacuum_prediction
    target: galileo_falling_bodies.vacuum_prediction

  - type: ref
    name: galileo_aristotle_contradicted
    target: galileo_falling_bodies.aristotle_contradicted

  - type: ref
    name: aristotle_law
    target: galileo_falling_bodies.heavier_falls_faster

  - type: retract_action
    name: retract_aristotle_theoretically
    target: aristotle_law
    reason: newton_vs_aristotle
    content: >
      牛顿的理论推导提供了第二条独立的反驳路径：
      伽利略通过归谬法暴露了亚里士多德定律的内在矛盾，
      牛顿则从更基本的力学定律直接推导出与之矛盾的结论。
      两条独立路径汇聚，进一步降低亚里士多德定律的可信度。
    prior: 0.95

chains:
  - name: equivalence_chain
    conclusion:
      type: equivalence
      name: galileo_equivalence
      between:
        - acceleration_independent_of_mass
        - galileo_vacuum_prediction
      content: >
        牛顿从 F=ma 和 F=mg 推导出的“a=g 与质量无关”
        与伽利略从思想实验和经验分析预测的“真空中不同重量物体等速下落”
        在物理含义上等价。
      reasoning: >
        两条结论虽然采用的方法不同，
        一个来自基本力学定律的演绎，一个来自思想实验和经验分析，
        但它们描述的是同一物理事实：自由落体加速度与质量无关。
      refs:
        - ref: acceleration_independent_of_mass
          dependency: direct
        - ref: galileo_vacuum_prediction
          dependency: direct

  - name: contradiction_relation_chain
    conclusion:
      type: contradiction
      name: newton_vs_aristotle
      between:
        - acceleration_independent_of_mass
        - aristotle_law
      content: >
        牛顿的 a=g（加速度与质量无关）直接矛盾于
        亚里士多德的 v∝W（下落速度与重量成正比）。
        前者是理论推导，后者是未经控制的经验归纳。
      reasoning: >
        一个命题断言自由落体加速度与质量无关，
        另一个命题断言下落速度随重量增大而增大。
        在无介质阻力的自由落体条件下，这两者不能同时成立。
      refs:
        - ref: acceleration_independent_of_mass
          dependency: direct
        - ref: aristotle_law
          dependency: direct

  - name: theoretical_contradiction_chain
    conclusion:
      type: claim
      name: newton_contradicts_aristotle
      content: >
        牛顿的 a=g 推导从理论上排除了“下落速度与重量成正比”的可能：
        如果加速度不依赖质量，那么亚里士多德的 v∝W 就不是自然界的规律。
        这与伽利略的归谬法反驳独立，提供了第二条反驳路径。
      reasoning: >
        一旦接受牛顿推导得到的 a=g 与质量无关，
        就必须拒绝“下落速度与重量成正比”这一旧规律。
        因此牛顿提供了不同于伽利略归谬法的第二条独立反驳路径。
      refs:
        - ref: acceleration_independent_of_mass
          dependency: direct
        - ref: aristotle_law
          dependency: direct
      prior: 0.5

  - name: two_path_rejection_chain
    conclusion:
      type: claim
      name: two_path_rejection_of_aristotle
      content: >
        亚里士多德落体学说同时遭到两条方法上不同的反驳路径削弱：
        伽利略通过绑球归谬法暴露其内在矛盾，
        牛顿则从更基本的力学定律推导出与之不相容的结果。
        两条路径相互独立地汇聚到同一结论。
      reasoning: >
        伽利略的反驳来自思想实验中的归谬法，
        牛顿的反驳来自基本力学定律的演绎推导。
        二者在方法上不同，却都指向同一个判断：
        亚里士多德的落体规律不能作为普遍定律保留。
      refs:
        - ref: galileo_aristotle_contradicted
          dependency: direct
        - ref: newton_contradicts_aristotle
          dependency: direct
      prior: 0.5

export:
  - galileo_equivalence
  - newton_contradicts_aristotle
  - newton_vs_aristotle
  - two_path_rejection_of_aristotle
