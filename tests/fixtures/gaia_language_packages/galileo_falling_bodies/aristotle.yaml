# 亚里士多德学说 — 即将被挑战的先验知识

type: reasoning_module
name: aristotle
title: "亚里士多德学说 — 即将被挑战的先验知识"

premises:
  - type: claim
    name: everyday_observation
    content: >
      在日常空气环境中，从同一高度落下时，石头通常比羽毛更早落地；
      重物看起来往往比轻物下落得更快。
    prior: 0.95
    metadata:
      source: "日常观察"

chains:
  - name: inductive_support
    conclusion:
      type: claim
      name: heavier_falls_faster
      content: >
        重的物体比轻的物体下落得更快。
        下落速度与重量成正比。
      reasoning: >
        日常经验反复呈现“重物先落地、轻物后落地”的现象，
        如果不区分空气阻力等外在因素，人们很自然会把这种表象
        归纳成一条普遍规律：重量越大，下落越快。
      refs:
        - ref: everyday_observation
          dependency: direct
      prior: 0.7
      metadata:
        source: "亚里士多德《物理学》第四卷"
        era: "约公元前350年"

export:
  - heavier_falls_faster
  - everyday_observation
