# 推理模块 — 伽利略的核心论证
# 演示：
#   1. 显式构造绑球思想实验的两条相反预测
#   2. 用 contradiction / retraction edge 回传削弱旧理论
#   3. 用介质密度分析解释日常观察为什么会误导
#   4. 用斜面实验为真空预测提供额外支持

type: reasoning_module
name: reasoning
title: "核心推理 — 伽利略的论证"

premises:
  - type: ref
    name: heavier_falls_faster
    target: aristotle.heavier_falls_faster

  - type: ref
    name: everyday_observation
    target: aristotle.everyday_observation

  - type: ref
    name: thought_experiment_env
    target: setting.thought_experiment_env

  - type: ref
    name: vacuum_env
    target: setting.vacuum_env

  - type: claim
    name: medium_density_observation
    content: >
      在水、油、空气等不同介质中比较轻重物体的下落，
      会发现介质越稠密，速度差异越明显；介质越稀薄，差异越不明显。
    prior: 0.88

  - type: claim
    name: inclined_plane_observation
    content: >
      伽利略的斜面实验把下落过程放慢到可测量尺度后显示：
      不同重量的小球在相同斜面条件下呈现近似一致的加速趋势，
      与“重量越大速度越大”的简单比例律并不相符。
    prior: 0.84

  - type: retract_action
    name: retract_aristotle
    target: heavier_falls_faster
    reason: tied_balls_contradiction
    content: >
      既然同一条亚里士多德定律在同一个绑球设定中推出了互不相容的结果，
      那么应当被削弱的是原定律本身，而不是这个思想实验。
      该矛盾直接回传，降低“重者下落更快”的可信度。
    prior: 0.96

chains:
  - name: drag_prediction_chain
    conclusion:
      type: claim
      name: tied_pair_slower_than_heavy
      content: >
        复合体 HL 因轻球拖拽，下落速度应慢于单独的重球 H。
      reasoning: >
        在思想实验中暂时接受“重者下落更快”这一前提时，
        轻球天然比重球下落更慢。于是当轻球与重球绑在一起时，
        轻球应当拖慢重球，复合体 HL 的下落速度应慢于单独的重球 H。
      refs:
        - ref: heavier_falls_faster
          dependency: direct
        - ref: thought_experiment_env
          dependency: indirect
      prior: 0.5
      conditional_prior: 0.93

  - name: combined_weight_chain
    conclusion:
      type: claim
      name: tied_pair_faster_than_heavy
      content: >
        复合体 HL 总重量大于单独的重球 H，下落速度应快于 H。
      reasoning: >
        按照“重量越大，下落越快”的同一条定律，
        被绑在一起后的复合体 HL 总重量大于单独的重球 H，
        因而它又应当比 H 下落更快。
        这给出了与“轻球拖慢重球”完全相反的第二条预测。
      refs:
        - ref: heavier_falls_faster
          dependency: direct
      prior: 0.5
      conditional_prior: 0.93

  - name: contradiction_chain
    conclusion:
      type: contradiction
      name: tied_balls_contradiction
      between:
        - tied_pair_slower_than_heavy
        - tied_pair_faster_than_heavy
      content: >
        同一定律对同一绑球系统同时预测“更慢”和“更快”，自相矛盾。
      reasoning: >
        这两条结论针对同一个绑球系统、同一时刻、同一环境，
        却分别断言“更慢”和“更快”，因此不能同时为真。
        这暴露出亚里士多德落体定律在该思想实验中的内在矛盾。
      refs:
        - ref: tied_pair_slower_than_heavy
          dependency: direct
        - ref: tied_pair_faster_than_heavy
          dependency: direct
      prior: 0.6
      conditional_prior: 0.97

  - name: verdict_chain
    conclusion:
      type: claim
      name: aristotle_contradicted
      content: >
        亚里士多德“重者下落更快”的定律因绑球矛盾而不能成立。
      reasoning: >
        绑球思想实验表明：如果坚持“下落速度与重量成正比”，
        就会同时得到“复合体更慢”和“复合体更快”两个互斥结论。
        因而该定律不能是关于自由落体的普遍真理。
      refs:
        - ref: tied_balls_contradiction
          dependency: direct
      prior: 0.5
      conditional_prior: 0.95

  - name: medium_trend_chain
    conclusion:
      type: claim
      name: medium_difference_shrinks
      content: >
        介质越稀薄，轻重物体的下落速度差异越小。
      reasoning: >
        如果从水到空气，随着介质变稀薄，轻重物体的速度差异持续缩小，
        那么这种差异更像是外部阻力效应，而不是重量本身对自由落体速度的直接支配。
      refs:
        - ref: medium_density_observation
          dependency: direct
      prior: 0.6
      conditional_prior: 0.88

  - name: confound_chain
    conclusion:
      type: claim
      name: air_resistance_is_confound
      content: >
        日常观察到的速度差异来自空气阻力，而非重量本身。
      reasoning: >
        由“介质越稀薄，差异越小”可知，介质阻力才是日常差异的主导因素。
        因而“重物先落地”的经验应被解释为外部介质造成的表象，
        而不是重量本身决定自由落体速度的证据。
      refs:
        - ref: medium_difference_shrinks
          dependency: direct
        - ref: everyday_observation
          dependency: indirect
      prior: 0.5
      conditional_prior: 0.9

  - name: inclined_plane_chain
    conclusion:
      type: claim
      name: inclined_plane_supports_equal_fall
      content: >
        斜面实验支持“重量不是决定落体速度的首要因素”。
      reasoning: >
        斜面实验把自由落体减慢到可测量尺度后，
        显示不同重量的小球在相同几何条件下获得近似一致的加速趋势。
        这虽然不是真空实验，却支持“重量不是决定落体快慢的首要因素”。
      refs:
        - ref: inclined_plane_observation
          dependency: direct
      prior: 0.55
      conditional_prior: 0.86

  - name: synthesis_chain
    conclusion:
      type: claim
      name: vacuum_prediction
      content: >
        在真空中，不同重量的物体应以相同速率下落。
      reasoning: >
        如果亚里士多德定律已被绑球归谬法否定，
        并且日常速度差异可以解释为空气阻力造成的混淆，
        再加上斜面实验对“重量不是首要因素”的支持，
        那么在无空气阻力的极限条件下，
        最合理的预测是：不同重量的物体应以相同速率下落。
      refs:
        - ref: aristotle_contradicted
          dependency: direct
        - ref: air_resistance_is_confound
          dependency: direct
        - ref: inclined_plane_supports_equal_fall
          dependency: direct
        - ref: vacuum_env
          dependency: indirect
      prior: 0.5
      conditional_prior: 0.94

export:
  - tied_pair_slower_than_heavy
  - tied_pair_faster_than_heavy
  - tied_balls_contradiction
  - vacuum_prediction
  - aristotle_contradicted
  - medium_density_observation
  - medium_difference_shrinks
  - air_resistance_is_confound
  - inclined_plane_observation
  - inclined_plane_supports_equal_fall
