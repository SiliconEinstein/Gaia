# 等价原理模块 — 爱因斯坦 1907 电梯思想实验

type: reasoning_module
name: equivalence_principle
title: "等价原理 — 爱因斯坦 1907 电梯思想实验"

premises:
  - type: ref
    name: eotvos_experiment
    target: prior_knowledge.eotvos_experiment

  - type: ref
    name: maxwell_electromagnetism
    target: prior_knowledge.maxwell_electromagnetism

  - type: setting
    name: elevator_env
    content: >
      想象一个密闭电梯，其中的观察者无法看到外界。
      如果电梯静止在引力场中（如地表），
      观察者感受到的“重力”与电梯在无引力的太空中以 g 加速上升时
      观察者感受到的“惯性力”完全不可区分。
    prior: 1.0

chains:
  - name: ep_derivation_chain
    conclusion:
      type: claim
      name: equivalence_principle
      content: >
        爱因斯坦等价原理：在足够小的时空区域内，
        引力效应与相应的加速参考系效应不可区分。
        这不只是 m_i = m_g 的重复陈述，
        而是将其提升为一条基本物理原理。
      reasoning: >
        惯性质量与引力质量的高精度等价，
        在电梯思想实验中意味着引力效应和加速度效应
        在局域范围内完全等价——不只是数值巧合，
        而是反映了更深层的物理等价性。
      refs:
        - ref: eotvos_experiment
          dependency: direct
        - ref: elevator_env
          dependency: direct
      prior: 0.5
      metadata:
        source: "爱因斯坦, Jahrbuch der Radioaktivität und Elektronik, 1907"

  - name: light_bending_chain
    conclusion:
      type: claim
      name: light_must_bend_in_gravity
      content: >
        等价原理的直接推论：光线在引力场中必须弯曲。
        这对牛顿力学和麦克斯韦电磁理论的结合提出了挑战，
        因为牛顿力学中引力只作用于有质量的物体。
      reasoning: >
        如果在加速电梯中，水平射入的光束会因电梯上升而呈现向下弯曲的路径，
        那么在与之等价的引力场中光也必须弯曲。
        结合麦克斯韦理论中“光是电磁波”的背景，
        这意味着光也不能免于引力的影响。
      refs:
        - ref: equivalence_principle
          dependency: direct
        - ref: maxwell_electromagnetism
          dependency: direct
      prior: 0.5

export:
  - equivalence_principle
  - light_must_bend_in_gravity
