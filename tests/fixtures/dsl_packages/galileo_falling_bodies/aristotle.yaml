# 亚里士多德学说 — 即将被挑战的先验知识

type: reasoning_module
name: aristotle

declarations:
  - type: claim
    name: heavier_falls_faster
    content: >
      重的物体比轻的物体下落得更快。
      下落速度与重量成正比。
    prior: 0.7
    metadata:
      source: "亚里士多德《物理学》第四卷"
      era: "约公元前350年"

  - type: claim
    name: everyday_observation
    content: >
      从同一高度落下时，石头比羽毛下落得更快。
    prior: 0.95
    metadata:
      source: "日常观察"

  # 日常观察支持亚里士多德学说
  - type: chain_expr
    name: inductive_support
    steps:
      - ref: everyday_observation
      - lambda: >
          日常经验一致表明较重的物体总是先落地，
          这支持了重量决定下落速度的一般规律。
        prior: 0.8
      - ref: heavier_falls_faster

export:
  - heavier_falls_faster
  - everyday_observation
