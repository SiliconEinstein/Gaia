# 后续模块 — 未来研究的开放问题

type: follow_up_module
name: follow_up

declarations:
  - type: ref
    name: vacuum_prediction
    target: reasoning.vacuum_prediction

  - type: question
    name: follow_up_question
    content: >
      能否通过实验验证真空中的预测？
      伽利略使用斜面作为近似，但真正的真空实验才是决定性的。

  - type: chain_expr
    name: next_steps
    steps:
      - ref: vacuum_prediction
      - lambda: >
          关于所有物体在真空中以相同速率下落的预测，
          需要在真正的真空环境中进行直接的实验验证。
      - ref: follow_up_question

export:
  - follow_up_question
