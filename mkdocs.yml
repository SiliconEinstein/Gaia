site_name: Gaia
site_description: Python DSL for knowledge authoring, compilation, and inference
site_url: https://siliconeinstein.github.io/Gaia/
repo_url: https://github.com/SiliconEinstein/Gaia
docs_dir: docs
site_dir: site
exclude_docs: |
  archive/**
  design/**
  ideas/**
  plans/**
  specs/**
  superpowers/**

validation:
  nav:
    omitted_files: ignore

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            filters:
              - "!^_"
            heading_level: 2
            inherited_members: false
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: true
            show_signature_annotations: true
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: README.md
  - Start Here:
      - What Is Gaia?: for-visitors/what-is-gaia.md
      - Quick Start: for-users/quick-start.md
      - Authoring Workflow: for-users/authoring-workflow.md
      - Hole And Bridge Tutorial: for-users/hole-bridge-tutorial.md
  - Examples:
      - Bayes LDL Phase II Trial: examples/bayes-ldl-trial.md
  - User Reference:
